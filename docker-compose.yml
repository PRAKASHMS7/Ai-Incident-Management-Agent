version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: incident-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  neo4j:
    image: neo4j:5.20.0-community
    container_name: incident-agent-neo4j
    ports:
      - "7474:7474" # Neo4j Browser HTTP Console
      - "7687:7687" # Bolt Protocol
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: incident-agent-app
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - LOG_LEVEL=INFO
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
      - SLACK_CHANNEL=${SLACK_CHANNEL}
    depends_on:
      - redis
      - neo4j
    restart: always

volumes:
  redis_data:
  neo4j_data:
  neo4j_logs:
